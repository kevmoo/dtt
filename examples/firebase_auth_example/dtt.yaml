# Declarative microservice infrastructure configuration
service:
  name: firebase-auth-triggers
  project_id: my-firebase-app
  region: us-central1

# Infrastructure trigger bindings mapped natively to GCP Eventarc rules
triggers:
  - name: auth-user-created
    type: google.firebase.auth.user.v1.created
    path: /events/auth
    handler: onUserCreated
