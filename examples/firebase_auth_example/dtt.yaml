# Declarative microservice infrastructure configuration
service:
  name: firestore-triggers
  project_id: n26-full-stack-dart
  region: us-central1

# Infrastructure trigger bindings mapped natively to GCP Eventarc rules
triggers:
  - name: user-written
    type: google.cloud.firestore.document.v1.written
    path: /events/users
    handler: onUserWritten
    database: "(default)"
    document: "documents/users/{userId}"
