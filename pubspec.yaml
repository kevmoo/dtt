name: dart_terraform_triggers_workspace
description: "Workspace root for the Dart Terraform Triggers (dtt) toolchain and library ecosystem."
publish_to: none

environment:
  sdk: ^3.12.0

workspace:
  - packages/dtt
  - packages/dtt_runtime
  - packages/google_cloud_events

# Workspace-wide test and integration utilities
dev_dependencies:
  checks: ^0.2.0
  dart_flutter_team_lints: ^3.5.2
  test: ^1.24.0
  test_descriptor: ^2.0.0
  test_process: ^2.1.0
